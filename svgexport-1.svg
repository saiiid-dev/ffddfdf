<svg viewBox="0 0 900 600"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    xmlns="http://www.w3.org/2000/svg"
    width="900" height="600" id="Berber_flag">

    <defs>
        <!-- Waves plus courbées et plus naturelles -->
        <filter id="fabricWave" x="-14%" y="-14%" width="128%" height="128%">
            <feTurbulence type="fractalNoise"
                baseFrequency="0.0017 0.016"
                numOctaves="2"
                seed="6"
                result="noise"/>

            <feDisplacementMap
                in="SourceGraphic"
                in2="noise"
                scale="24"
                xChannelSelector="R"
                yChannelSelector="G"/>
        </filter>

        <!-- Shadow plus visible et réaliste -->
        <filter id="softShadow" x="-34%" y="-34%" width="168%" height="168%">
            <feDropShadow dx="0" dy="26" stdDeviation="26"
                flood-color="#000000" flood-opacity="0.56"/>
            <feDropShadow dx="0" dy="10" stdDeviation="12"
                flood-color="#000000" flood-opacity="0.26"/>
        </filter>

        <!-- Reflets / ombres horizontaux plus “textile” -->
        <linearGradient id="clothShade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="white" stop-opacity="0.15"/>
            <stop offset="9%"   stop-color="white" stop-opacity="0.05"/>
            <stop offset="21%"  stop-color="black" stop-opacity="0.16"/>
            <stop offset="36%"  stop-color="white" stop-opacity="0.12"/>
            <stop offset="51%"  stop-color="black" stop-opacity="0.20"/>
            <stop offset="66%"  stop-color="white" stop-opacity="0.11"/>
            <stop offset="80%"  stop-color="black" stop-opacity="0.14"/>
            <stop offset="92%"  stop-color="white" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="black" stop-opacity="0.03"/>
        </linearGradient>

        <!-- Profondeur globale -->
        <linearGradient id="depthShade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
            <stop offset="45%" stop-color="black" stop-opacity="0.07"/>
            <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
        </linearGradient>

        <mask id="flagMask">
            <rect x="0" y="0" width="900" height="600" fill="white"/>
        </mask>
    </defs>

    <g>
        <!-- Fond du drapeau uniquement -->
        <g filter="url(#softShadow)">
            <g filter="url(#fabricWave)">
                <rect fill="#0090DA" width="900" height="200"/>
                <rect fill="#78BE20" y="200" width="900" height="200"/>
                <rect fill="#FEDD00" y="400" width="900" height="200"/>

                <!-- Reflets / plis -->
                <rect x="0" y="0" width="900" height="600"
                    fill="url(#clothShade)"
                    opacity="1"
                    mask="url(#flagMask)"/>

                <!-- Profondeur -->
                <rect x="0" y="0" width="900" height="600"
                    fill="url(#depthShade)"
                    opacity="0.85"
                    mask="url(#flagMask)"/>
            </g>
        </g>

        <!-- Symbole rouge inchangé -->
        <polygon fill="#CC0033" points="429.675,477.64 458.13,507.721 466.26,97.9695 450,80.8966 "/>

        <path fill="#CC0033" d="M657.315 515.851l54.4711 -23.5769c-104.877,-104.064 -165.039,-142.275 -264.225,-144.714 -126.015,8.94308 -208.128,59.3489 -243.087,159.348l24.3898 -4.87785c99.9991,-123.576 156.909,-109.755 220.323,-117.072 67.4791,2.43908 136.584,46.3409 208.128,130.893l0 -0.000307692z"/>

        <path fill="#CC0033" d="M289.839 93.0917l-52.032 13.8209c50.4058,89.4298 122.763,143.901 215.445,147.966 122.763,0.812923 193.494,-82.1129 242.274,-156.909l-41.4631 12.1951c-78.8609,111.381 -164.226,115.446 -202.437,109.755 -64.2271,-4.87785 -117.072,-57.7231 -161.787,-126.828z"/>
    </g>
</svg>